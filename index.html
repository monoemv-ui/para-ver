<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineLatino</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080810; --surface:#10101c; --s2:#18182a; --s3:#20203a;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --red:#e63946; --orange:#f4a261; --blue:#4361ee; --teal:#2ec4b6;
  --text:#f0eef8; --muted:#7a788a; --muted2:#a09db5;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}

/* TOPBAR */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:300;height:58px;
  display:flex;align-items:center;gap:12px;padding:0 20px;
  background:rgba(8,8,16,.96);border-bottom:1px solid var(--border);
  backdrop-filter:blur(14px);
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:3px;color:var(--red);flex-shrink:0;}
.logo em{color:var(--text);font-style:normal;}
.tabs{display:flex;gap:3px;flex-shrink:0;}
.tab{background:none;border:none;color:var(--muted);cursor:pointer;
  font-family:'Outfit',sans-serif;font-size:.8rem;font-weight:500;
  padding:5px 13px;border-radius:20px;transition:all .2s;}
.tab:hover{color:var(--text);background:var(--s2);}
.tab.on{color:#fff;background:var(--red);}
.searchbox{margin-left:auto;display:flex;align-items:center;gap:8px;position:relative;}
#search-input{
  background:var(--s2);border:1px solid var(--border2);color:var(--text);
  padding:7px 32px 7px 34px;border-radius:8px;font-family:'Outfit',sans-serif;
  font-size:.85rem;outline:none;width:240px;transition:border-color .2s,width .3s;
}
#search-input:focus{border-color:var(--red);width:300px;}
#search-input::placeholder{color:var(--muted);}
.s-icon{position:absolute;left:11px;color:var(--muted);font-size:13px;pointer-events:none;}
#s-clear{position:absolute;right:10px;background:none;border:none;color:var(--muted);
  cursor:pointer;font-size:18px;display:none;line-height:1;padding:0;}
#autocomplete{
  position:absolute;top:calc(100% + 6px);right:0;width:320px;
  background:var(--surface);border:1px solid var(--border2);border-radius:10px;
  box-shadow:0 12px 40px rgba(0,0,0,.7);overflow:hidden;display:none;z-index:400;
  max-height:360px;overflow-y:auto;
}
.ac-item{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;
  transition:background .15s;border-bottom:1px solid var(--border);}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:var(--s2);}
.ac-thumb{width:34px;height:51px;object-fit:cover;border-radius:4px;flex-shrink:0;}
.ac-title{font-size:.82rem;font-weight:500;line-height:1.3;}
.ac-meta{font-size:.68rem;color:var(--muted);margin-top:2px;}
.ac-msg{padding:12px;font-size:.8rem;color:var(--muted);text-align:center;}

/* HERO */
#hero{position:relative;height:490px;overflow:hidden;display:flex;align-items:flex-end;margin-top:58px;}
#hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 20%;}
#hero-bg::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to top,var(--bg) 0%,rgba(8,8,16,.5) 50%,transparent 100%);}
#hero-bg::before{content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,rgba(8,8,16,.9) 0%,transparent 55%);}
.hero-c{position:relative;z-index:2;padding:2rem 2.5rem 2.8rem;max-width:520px;}
.hero-badge{display:inline-block;background:rgba(230,57,70,.18);border:1px solid rgba(230,57,70,.35);
  color:var(--red);font-size:.65rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  padding:3px 9px;border-radius:4px;margin-bottom:10px;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:3rem;line-height:1;
  letter-spacing:2px;margin-bottom:10px;}
.hero-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px;}
.hero-meta span{font-size:.78rem;color:var(--muted2);}
.hero-meta .star{color:var(--orange);font-weight:600;}
.hero-desc{font-size:.875rem;line-height:1.65;color:#aaa;margin-bottom:18px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.hero-btns{display:flex;gap:10px;flex-wrap:wrap;}
.hbtn{display:flex;align-items:center;gap:7px;border:none;padding:10px 22px;
  border-radius:8px;font-family:'Outfit',sans-serif;font-weight:600;font-size:.875rem;
  cursor:pointer;transition:all .2s;}
.hbtn-red{background:var(--red);color:#fff;}
.hbtn-red:hover{background:#c1121f;transform:translateY(-1px);}
.hbtn-ghost{background:rgba(255,255,255,.1);color:var(--text);
  border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(4px);}
.hbtn-ghost:hover{background:rgba(255,255,255,.18);}

/* MAIN */
main{padding:1.5rem 1.5rem 5rem;}
.genre-bar{display:flex;gap:7px;overflow-x:auto;padding-bottom:6px;
  margin-bottom:1.5rem;scrollbar-width:none;}
.genre-bar::-webkit-scrollbar{display:none;}
.gp{background:var(--surface);border:1px solid var(--border);color:var(--muted2);
  padding:5px 15px;border-radius:20px;cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:.78rem;font-weight:500;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.gp:hover,.gp.on{background:var(--red);border-color:var(--red);color:#fff;}
.section{margin-bottom:2rem;}
.sec-head{display:flex;align-items:center;margin-bottom:.9rem;}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;}
.row{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px;
  scrollbar-width:thin;scrollbar-color:var(--s3) transparent;}
.row::-webkit-scrollbar{height:3px;}
.row::-webkit-scrollbar-thumb{background:var(--s3);border-radius:4px;}

/* CARDS */
.card{flex:0 0 148px;width:148px;border-radius:8px;overflow:hidden;cursor:pointer;
  position:relative;background:var(--surface);transition:transform .25s,box-shadow .25s;}
.card:hover{transform:translateY(-6px) scale(1.04);box-shadow:0 14px 36px rgba(0,0,0,.8);z-index:5;}
.card img{width:100%;height:222px;object-fit:cover;display:block;}
.card-badge{position:absolute;top:7px;left:7px;background:rgba(8,8,16,.82);
  border:1px solid var(--border2);color:var(--muted2);font-size:.58rem;font-weight:600;
  letter-spacing:1px;padding:2px 6px;border-radius:4px;text-transform:uppercase;}
.card-badge.tv{color:var(--teal);border-color:rgba(46,196,182,.3);}
.card-over{position:absolute;inset:0;
  background:linear-gradient(to top,rgba(8,8,16,.97) 0%,transparent 55%);
  opacity:0;transition:opacity .22s;display:flex;flex-direction:column;
  justify-content:flex-end;padding:9px;}
.card:hover .card-over{opacity:1;}
.card-name{font-size:.72rem;font-weight:600;line-height:1.3;margin-bottom:5px;}
.card-acts{display:flex;gap:5px;}
.ca{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:11px;transition:transform .15s;}
.ca:hover{transform:scale(1.12);}
.ca-play{background:var(--red);color:#fff;}
.ca-info{background:rgba(255,255,255,.18);color:#fff;}
.card-bot{padding:8px 10px 10px;}
.card-ttl{font-size:.73rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.card-row{display:flex;justify-content:space-between;margin-top:3px;}
.card-yr{font-size:.63rem;color:var(--muted);}
.card-rat{font-size:.63rem;color:var(--orange);}
.skel{flex:0 0 148px;width:148px;height:222px;background:var(--s2);
  border-radius:8px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

/* ── REPRODUCTOR FULLSCREEN ── */
#player-page{
  display:none;
  position:fixed;inset:0;z-index:400;
  background:var(--bg);
  flex-direction:column;
}
#player-page.open{display:flex;}

#player-topbar{
  height:52px;flex-shrink:0;
  display:flex;align-items:center;gap:14px;padding:0 18px;
  background:rgba(8,8,16,.98);border-bottom:1px solid var(--border);
}
#player-back{
  background:var(--s2);border:1px solid var(--border2);color:var(--text);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;transition:background .2s;
}
#player-back:hover{background:var(--red);}
#player-movie-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:1px;}
#player-movie-meta{font-size:.72rem;color:var(--muted);margin-left:4px;}

#player-layout{
  flex:1;display:flex;overflow:hidden;
}

/* VIDEO PRINCIPAL */
#video-col{
  flex:1;display:flex;flex-direction:column;background:#000;min-width:0;
}
#video-wrap{
  position:relative;width:100%;
  /* Altura calculada: pantalla - topbar(52px) - barra-resultados(~44px) */
  flex:1;
  background:#000;
}
#main-frame{
  position:absolute;top:0;left:0;
  width:100%;height:100%;
  border:none;
}
#rbar{
  flex-shrink:0;height:44px;
  display:flex;align-items:center;gap:6px;
  padding:0 12px;
  background:var(--s2);border-top:1px solid var(--border);
  overflow-x:auto;white-space:nowrap;scrollbar-width:thin;
}
#rbar::-webkit-scrollbar{height:3px;}
#rbar::-webkit-scrollbar-thumb{background:var(--s3);}
.rb{
  background:var(--s3);border:1px solid var(--border2);color:var(--text);
  padding:4px 11px;border-radius:6px;font-size:.67rem;cursor:pointer;
  font-family:'Outfit',sans-serif;white-space:nowrap;flex-shrink:0;
  transition:all .15s;
}
.rb:hover,.rb.on{background:var(--red);border-color:var(--red);}
.rb-ext{
  background:transparent;border:1px solid rgba(255,80,80,.35);color:#ff7070;
  padding:4px 11px;border-radius:6px;font-size:.67rem;white-space:nowrap;
  text-decoration:none;flex-shrink:0;
}
.rb-searching{color:var(--muted2);font-size:.73rem;flex-shrink:0;}

/* PANEL LATERAL */
#side-panel{
  width:300px;flex-shrink:0;
  background:var(--surface);border-left:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;
}
#side-poster img{width:100%;height:180px;object-fit:cover;display:block;}
#side-info{padding:14px;}
#side-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:1px;margin-bottom:4px;}
#side-meta{font-size:.72rem;color:var(--muted);margin-bottom:10px;}
#side-desc{font-size:.78rem;line-height:1.6;color:var(--muted2);margin-bottom:14px;
  display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.side-label{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:7px;}
.side-opts{display:flex;flex-direction:column;gap:6px;}
.sopt{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;
  border:1px solid var(--border2);cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:.78rem;font-weight:500;transition:all .2s;text-decoration:none;
  color:var(--text);background:var(--s2);width:100%;text-align:left;}
.sopt:hover{transform:translateX(2px);}
.soicon{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;font-size:12px;flex-shrink:0;}
.sosub{font-size:.62rem;color:var(--muted);margin-top:1px;}
.sopt.yt{border-color:rgba(255,0,0,.3);}
.sopt.yt:hover{background:rgba(255,0,0,.1);}
.sopt.trailer{border-color:rgba(67,97,238,.3);}
.sopt.trailer:hover{background:rgba(67,97,238,.1);}
.prov-sec{margin-top:12px;}
.pchips{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.pchip{background:var(--s3);border:1px solid var(--border2);
  border-radius:5px;padding:2px 8px;font-size:.64rem;color:var(--muted2);}

/* MODAL INFO (para ver detalles sin reproducir) */
#modal{display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.88);overflow-y:auto;padding:1rem;
  align-items:flex-start;justify-content:center;}
#modal.open{display:flex;}
.mbox{background:var(--surface);border-radius:14px;width:100%;max-width:700px;
  overflow:hidden;border:1px solid var(--border2);margin:auto;}
.mhead{display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-bottom:1px solid var(--border);}
.mhead h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:1px;}
.mhead p{font-size:.75rem;color:var(--muted);margin-top:2px;}
.mcls{background:var(--s2);border:1px solid var(--border2);color:var(--text);
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;}
.mcls:hover{background:var(--red);}
.mbody{display:grid;grid-template-columns:170px 1fr;}
.mposter img{width:170px;height:255px;object-fit:cover;display:block;}
.minfo{padding:16px;display:flex;flex-direction:column;gap:12px;}
.moverview{font-size:.82rem;line-height:1.65;color:var(--muted2);}
.olabel{font-size:.63rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;}
.mopts{display:flex;flex-direction:column;gap:6px;}
.mopt{display:flex;align-items:center;gap:9px;padding:9px 13px;border-radius:9px;
  border:1px solid var(--border2);cursor:pointer;font-family:'Outfit',sans-serif;
  font-size:.8rem;font-weight:500;transition:all .2s;text-decoration:none;
  color:var(--text);background:var(--s2);width:100%;text-align:left;}
.mopt:hover{transform:translateX(3px);}
.moicon{width:27px;height:27px;border-radius:6px;display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0;}
.mosub{font-size:.66rem;color:var(--muted);margin-top:1px;}
.mopt.yt{border-color:rgba(255,0,0,.3);}
.mopt.yt:hover{background:rgba(255,0,0,.1);}
.mopt.trailer{border-color:rgba(67,97,238,.3);}
.mopt.trailer:hover{background:rgba(67,97,238,.1);}

/* TOAST */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:600;
  background:var(--s2);border:1px solid var(--border2);
  padding:10px 18px;border-radius:8px;font-size:.82rem;
  transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;}
#toast.show{transform:translateY(0);opacity:1;}

@media(max-width:700px){
  #side-panel{display:none;}
  .mbody{grid-template-columns:1fr;}
  .mposter{display:none;}
  .tabs .tab:not(.on){display:none;}
  #search-input{width:150px;}
  #search-input:focus{width:185px;}
  #autocomplete{width:250px;}
}
</style>
</head>
<body>

<!-- TOPBAR PRINCIPAL -->
<div id="topbar">
  <div class="logo">Cine<em>Latino</em></div>
  <div class="tabs">
    <button class="tab on" onclick="setMode('all',this)">Todo</button>
    <button class="tab" onclick="setMode('movie',this)">Películas</button>
    <button class="tab" onclick="setMode('tv',this)">Series</button>
  </div>
  <div class="searchbox">
    <span class="s-icon">🔍</span>
    <input id="search-input" type="text" placeholder="Buscar película o serie..." autocomplete="off">
    <button id="s-clear" onclick="clearSearch()">×</button>
    <div id="autocomplete"></div>
  </div>
</div>

<!-- HERO -->
<div id="hero">
  <div id="hero-bg"></div>
  <div class="hero-c">
    <div class="hero-badge" id="hero-badge">🎬 Película</div>
    <div class="hero-title" id="hero-title">Cargando...</div>
    <div class="hero-meta" id="hero-meta"></div>
    <div class="hero-desc" id="hero-desc"></div>
    <div class="hero-btns">
      <button class="hbtn hbtn-red" id="hero-play">▶ Reproducir</button>
      <button class="hbtn hbtn-ghost" id="hero-info">ℹ Más info</button>

</div>

<main>
  <div class="genre-bar" id="genre-bar"></div>

  <div class="section">

  </div>
  <div class="section">
    <div class="sec-head"><div class="sec-title">🌎 Cine en Español</div></div>
    <div class="row" id="row-latam"></div>
  </div>
  <div class="section">
    <div class="sec-head"><div class="sec-title">💥 Acción</div></div>
    <div class="row" id="row-action"></div>
  </div>
  <div class="section">
    <div class="sec-head"><div class="sec-title">😂 Comedia</div></div>
    <div class="row" id="row-comedy"></div>
  </div>
  <div class="section" id="sec-series">
    <div class="sec-head"><div class="sec-title">📺 Series Populares</div></div>
    <div class="row" id="row-series"></div>
  </div>
  <div class="section">
    <div class="sec-head"><div class="sec-title">🎭 Drama</div></div>
    <div class="row" id="row-drama"></div>
  </div>
</main>

<!-- ── REPRODUCTOR FULLSCREEN ── -->
<div id="player-page">
  <div id="player-topbar">
    <button id="player-back" onclick="closePlayer()">←</button>
    <div>
      <span id="player-movie-title">—</span>
      <span id="player-movie-meta"></span>
    </div>

  <div id="player-layout">
    <!-- VIDEO -->
    <div id="video-col">
      <div id="video-wrap">

        <span class="rb-searching">Iniciando...</span>
      </div>
    </div>
    <!-- PANEL LATERAL -->
    <div id="side-panel">
      <div id="side-poster"><img id="side-img" src="" alt=""></div>
      <div id="side-info">
        <div id="side-title">—</div>
        <div id="side-meta"></div>
        <div id="side-desc"></div>
        <div class="side-label">Otras opciones</div>
        <div class="side-opts" id="side-opts"></div>
        <div id="side-prov" style="display:none;" class="prov-sec">
          <div class="side-label">También en</div>
          <div class="pchips" id="side-chips"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL INFO -->
<div id="modal">
  <div class="mbox">
    <div class="mhead">
      <div>
        <h2 id="m-title">—</h2>
        <p id="m-meta"></p>
      </div>
      <button class="mcls" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody">
      <div class="mposter"><img id="m-poster" src="" alt=""></div>
      <div class="minfo">
        <div class="moverview" id="m-desc"></div>
        <div>
          <div class="olabel">▶ Reproducir</div>
          <div class="mopts" id="m-opts">
            <div style="color:var(--muted);font-size:.8rem;">Cargando...</div>
          </div>
        </div>
        <div id="m-prov" style="display:none;" class="prov-sec">
          <div class="olabel">También disponible en</div>
          <div class="pchips" id="m-chips"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

  if (!r.ok) throw new Error(r.status);
  return r.json();
}

      const t = setTimeout(() => ctrl.abort(), 5000);
      const r = await fetch(
        `${host}/api/v1/search?q=${encodeURIComponent(query)}&type=video&fields=videoId,title,lengthSeconds`,
        { signal: ctrl.signal }
      );
      clearTimeout(t);
      if (!r.ok) continue;
      const d = await r.json();
      const list = (Array.isArray(d) ? d : d.items||[]).filter(v=>v.videoId);
      if (list.length) return list.slice(0,8);
    } catch { continue; }
  }
  return [];
}

/* ── CARDS ── */
function skels(id, n=10) {
  const el = document.getElementById(id);
  if (el) el.innerHTML = Array(n).fill('<div class="skel"></div>').join('');
}

function renderCards(items, rowId) {
  const el = document.getElementById(rowId);
  if (!el) return;
  if (!items?.length) {
    el.innerHTML = '<p style="color:var(--muted);font-size:.8rem;padding:6px;">Sin resultados</p>';
    return;
  }
  el.innerHTML = items.map(item => {
    const isTV  = item.media_type==='tv' || !!item.first_air_date;
    const title = (item.title||item.name||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    const poster= item.poster_path ? `${IMG}w300${item.poster_path}`
      : `https://placehold.co/148x222/10101c/7a788a?text=Sin+imagen`;
    const year  = (item.release_date||item.first_air_date||'').slice(0,4);
    const rat   = item.vote_average ? item.vote_average.toFixed(1) : '';
    const type  = isTV ? 'tv' : 'movie';
    return `<div class="card" onclick="openInfo(${item.id},'${type}')">
      <img src="${poster}" alt="${title}" loading="lazy">
      <span class="card-badge ${isTV?'tv':''}">${isTV?'SERIE':'FILM'}</span>
      <div class="card-over">
        <div class="card-name">${title}</div>
        <div class="card-acts">
          <button class="ca ca-play" onclick="event.stopPropagation();playMovie(${item.id},'${type}')">▶</button>
          <button class="ca ca-info" onclick="event.stopPropagation();openInfo(${item.id},'${type}')">ℹ</button>
        </div>
      </div>
      <div class="card-bot">
        <div class="card-ttl">${title}</div>
        <div class="card-row">
          <span class="card-yr">${year}</span>
          ${rat?`<span class="card-rat">⭐${rat}</span>`:''}
        </div>
      </div>
    </div>`;
  }).join('');
}

async function loadRow(path, rowId, params={}) {
  skels(rowId);
  try {
    const d = await api(path, params);
    renderCards(d.results||[], rowId);
    return d.results||[];
  } catch {
    const el = document.getElementById(rowId);
    if (el) el.innerHTML = '<p style="color:var(--muted);font-size:.8rem;padding:6px;">Error al cargar</p>';
    return [];
  }
}

/* ── HERO ── */
function setHero(items) {
  if (!items?.length) return;
  const m = items[Math.floor(Math.random() * Math.min(5, items.length))];
  const isTV = m.media_type==='tv' || !!m.first_air_date;
  const type = isTV ? 'tv' : 'movie';
  const title= m.title||m.name||'';
  const year = (m.release_date||m.first_air_date||'').slice(0,4);
  if (m.backdrop_path)
    document.getElementById('hero-bg').style.backgroundImage = `url(${IMG}w1280${m.backdrop_path})`;
  document.getElementById('hero-badge').textContent = isTV ? '📺 Serie' : '🎬 Película';
  document.getElementById('hero-title').textContent = title;
  document.getElementById('hero-desc').textContent  = m.overview||'Sin descripción.';
  const gs = (m.genre_ids||[]).slice(0,3).map(id=>GENRES[id]).filter(Boolean).join(' · ');
  document.getElementById('hero-meta').innerHTML =
    `${m.vote_average?`<span class="star">⭐ ${m.vote_average.toFixed(1)}</span>`:''}
     ${year?`<span>${year}</span>`:''}${gs?`<span>${gs}</span>`:''}`;
  document.getElementById('hero-play').onclick = () => playMovie(m.id, type);
  document.getElementById('hero-info').onclick = () => openInfo(m.id, type);
}

/* ── MODO ── */
function setMode(m, btn) {
  appMode = m;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('.gp').forEach(g=>g.classList.remove('on'));
  document.getElementById('sec-series').style.display = m==='movie' ? 'none' : '';
  if (m==='tv') {
    document.getElementById('ttl-trend').textContent = '🔥 Series en Tendencia';
    loadRow('/trending/tv/day','row-trend').then(setHero);
    loadRow('/tv/top_rated','row-top');
    loadRow('/tv/airing_today','row-series');
  } else if (m==='movie') {
    document.getElementById('ttl-trend').textContent = '🔥 Películas en Tendencia';
    loadRow('/trending/movie/day','row-trend').then(setHero);
    loadRow('/movie/top_rated','row-top');
  } else {
    document.getElementById('ttl-trend').textContent = '🔥 Tendencias Hoy';
    loadRow('/trending/all/day','row-trend').then(setHero);
    loadRow('/movie/top_rated','row-top');
  }
}

/* ── GÉNEROS ── */
function buildGenres() {
  const ids = [28,35,18,27,10749,878,53,12,80,9648];
  document.getElementById('genre-bar').innerHTML = ids.map(id=>
    `<button class="gp" onclick="filterGenre(${id},this)">${GENRES[id]}</button>`
  ).join('');
}
async function filterGenre(gid, btn) {
  document.querySelectorAll('.gp').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  const ep = appMode==='tv' ? '/discover/tv' : '/discover/movie';
  const res = await loadRow(ep,'row-trend',{with_genres:gid,sort_by:'popularity.desc'});
  if (res.length) setHero(res);
}

/* ── BÚSQUEDA ── */
let acTimer, lastQ='';
const sinput = document.getElementById('search-input');
const acBox  = document.getElementById('autocomplete');

sinput.addEventListener('input', e => {
  const q = e.target.value.trim();
  document.getElementById('s-clear').style.display = q ? 'block' : 'none';
  clearTimeout(acTimer);
  if (!q) { closeAC(); return; }
  acTimer = setTimeout(() => doSearch(q), 380);
});
sinput.addEventListener('keydown', e => {
  if (e.key==='Escape') clearSearch();
  if (e.key==='Enter') { closeAC(); sinput.blur(); }
});
document.addEventListener('click', e => {
  if (!e.target.closest('.searchbox')) closeAC();
});

async function doSearch(q) {
  if (q===lastQ) return;
  lastQ = q;
  showAC('<div class="ac-msg">Buscando...</div>');
  try {
    const d = await api('/search/multi', {query:q});
    const items = (d.results||[])
      .filter(r=>r.poster_path&&(r.media_type==='movie'||r.media_type==='tv'))
      .slice(0,6);
    if (!items.length) { showAC(`<div class="ac-msg">Sin resultados para "${q}"</div>`); return; }
    acBox.innerHTML = items.map(item => {
      const isTV  = item.media_type==='tv';
      const title = item.title||item.name||'';
      const year  = (item.release_date||item.first_air_date||'').slice(0,4);
      const rat   = item.vote_average ? item.vote_average.toFixed(1) : '';
      const type  = isTV ? 'tv' : 'movie';
      const thumb = item.poster_path ? `${IMG}w92${item.poster_path}`
        : `https://placehold.co/34x51/10101c/7a788a?text=?`;
      return `<div class="ac-item" onclick="pickResult(${item.id},'${type}')">
        <img class="ac-thumb" src="${thumb}" alt="">
        <div>
          <div class="ac-title">${title}</div>
          <div class="ac-meta">${isTV?'Serie':'Película'} · ${year}${rat?' · ⭐'+rat:''}</div>
        </div>
      </div>`;
    }).join('');
    acBox.style.display = 'block';
    renderCards(items, 'row-search');
    document.getElementById('search-ttl').textContent = `🔎 "${q}"`;
    document.getElementById('sec-search').style.display = '';
  } catch {
    showAC('<div class="ac-msg">Error al buscar</div>');
  }
}
function showAC(html){ acBox.innerHTML=html; acBox.style.display='block'; }
function closeAC(){ acBox.style.display='none'; }
function pickResult(id, type){ closeAC(); sinput.blur(); openInfo(id, type); }
function clearSearch(){
  sinput.value=''; document.getElementById('s-clear').style.display='none';
  document.getElementById('sec-search').style.display='none'; lastQ=''; closeAC();
}

/* ─────────────────────────────────────────
   REPRODUCTOR FULLSCREEN
───────────────────────────────────────── */
let currentMovie = null;

async function playMovie(id, type) {
  // Abrir pantalla de reproducción
  const page = document.getElementById('player-page');
  page.classList.add('open');
  document.body.style.overflow = 'hidden';
  closeModal();

  // Resetear
  const frame = document.getElementById('main-frame');

  document.getElementById('side-prov').style.display = 'none';
  document.getElementById('player-movie-title').textContent = '...';
  document.getElementById('player-movie-meta').textContent = '';

  try {
    const [det, vids, prov] = await Promise.all([
      api(`/${type}/${id}`),

    const genres  = (det.genres||[]).map(g=>g.name).slice(0,3).join(', ');
    const runtime = det.runtime ? `${det.runtime} min` : det.episode_run_time?.[0] ? `~${det.episode_run_time[0]}min/ep` : '';
    const poster  = det.poster_path   ? `${IMG}w300${det.poster_path}`  : '';
    const backdrop= det.backdrop_path ? `${IMG}w780${det.backdrop_path}`: '';

    currentMovie = { id, type, title, year, tipo: type==='tv'?'serie':'pelicula' };

    // Topbar
    document.getElementById('player-movie-title').textContent = title;
    document.getElementById('player-movie-meta').textContent  = ` · ${[year, rating?'⭐'+rating:'', runtime].filter(Boolean).join(' · ')}`;

    // Panel lateral
    const simg = document.getElementById('side-img');
    simg.src = backdrop || poster;
    simg.style.display = backdrop||poster ? '' : 'none';
    document.getElementById('side-title').textContent = title;
    document.getElementById('side-meta').textContent  = [year, genres, rating?`⭐ ${rating}`:''].filter(Boolean).join(' · ');
    document.getElementById('side-desc').textContent  = det.overview||'Sin descripción.';

    // Videos TMDB
    const ytVids  = (vids.results||[]).filter(v=>v.site==='YouTube');
    const esTrail = ytVids.find(v=>v.type==='Trailer'&&v.iso_639_1==='es');
    const trailer = esTrail || ytVids.find(v=>v.type==='Trailer') || ytVids[0];
    const safeT   = title.replace(/'/g,"\\'");
    const tipo    = type==='tv' ? 'serie' : 'pelicula';

    // Opciones laterales
    let shtml = '';
    if (trailer) {
      const tl = esTrail ? 'Tráiler en Español' : 'Tráiler Oficial';
      shtml += `<button class="sopt trailer" onclick="loadFrame('${trailer.key}')">
        <div class="soicon" style="background:var(--blue);">🎞</div>
        <div><div>${tl}</div><div class="sosub">${trailer.name||''}</div></div>
      </button>`;
    }

    shtml += `<a class="sopt" href="https://www.themoviedb.org/${type}/${id}" target="_blank">
      <div class="soicon" style="background:var(--s3);">🎬</div>
      <div><div>Ficha TMDB</div><div class="sosub">Reparto y más info</div></div>
    </a>`;
    document.getElementById('side-opts').innerHTML = shtml;

    // Plataformas de pago
    const reg = prov.results?.CO||prov.results?.MX||prov.results?.AR||prov.results?.ES||prov.results?.US;
    if (reg) {
      const all    = [...(reg.flatrate||[]),...(reg.rent||[]),...(reg.buy||[])];
      const unique = [...new Map(all.map(p=>[p.provider_id,p])).values()];
      if (unique.length) {
        document.getElementById('side-chips').innerHTML = unique.slice(0,6)
          .map(p=>`<span class="pchip">${p.provider_name}</span>`).join('');
        document.getElementById('side-prov').style.display = '';
      }
    }

    // Buscar y reproducir
    await searchAndPlay(title, year, tipo);

  } catch(e) {
    document.getElementById('rbar').innerHTML =
      `<span class="rb-searching">Error al cargar detalles</span>`;
  }
}

// Carga un videoId directamente en el iframe
function loadFrame(videoId) {
  document.getElementById('main-frame').src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
  document.querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));
}

// Busca en Invidious y reproduce el mejor resultado
async function searchAndPlay(title, year, tipo) {
  const frame = document.getElementById('main-frame');
  const rbar  = document.getElementById('rbar');

  rbar.innerHTML = `<span class="rb-searching">🔍 Buscando "${title}" en español...</span>`;
  frame.src = '';

  const queries = [
    `${title} ${year} ${tipo} completa español latino`,
    `${title} ${year} ${tipo} completa subtitulada español`,
    `${title} ${year} ${tipo} completa`,
  ];

  let results = [];
  for (const q of queries) {
    results = await ytSearch(q);
    if (results.length) break;
  }

  if (results.length) {
    loadFrame(results[0].videoId);
    const q0 = encodeURIComponent(`${title} ${year} ${tipo} completa español`);
    rbar.innerHTML =
      `<span style="color:var(--muted2);font-size:.68rem;flex-shrink:0;margin-right:4px;">▶</span>` +
      results.map((v,i) => {
        const lbl = (v.title||'Video').slice(0,28);
        return `<button class="rb ${i===0?'on':''}" onclick="switchVid('${v.videoId}',this)">${i===0?'▶ ':''}${lbl}</button>`;
      }).join('') +
      `<a class="rb-ext" href="https://www.youtube.com/results?search_query=${q0}" target="_blank">Más ↗</a>`;
    // Marcar el primero como activo
    const firstBtn = rbar.querySelector('.rb');
    if (firstBtn) firstBtn.classList.add('on');
  } else {
    // Fallback
    const q0 = encodeURIComponent(`${title} ${year} ${tipo} completa español`);
    const q1 = encodeURIComponent(`${title} ${year} ${tipo} completa subtitulada`);
    rbar.innerHTML =
      `<span class="rb-searching">No encontrado automáticamente →</span>
       <a class="rb-ext" href="https://www.youtube.com/results?search_query=${q0}" target="_blank">Buscar en español ↗</a>
       <a class="rb-ext" href="https://www.youtube.com/results?search_query=${q1}" target="_blank">Subtitulada ↗</a>`;
  }
}

function switchVid(videoId, btn) {
  document.getElementById('main-frame').src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
  document.querySelectorAll('.rb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}

function closePlayer() {
  document.getElementById('player-page').classList.remove('open');
  document.getElementById('main-frame').src = '';
  document.body.style.overflow = '';
}

// ESC para cerrar el reproductor
document.addEventListener('keydown', e => {
  if (e.key==='Escape') {
    if (document.getElementById('player-page').classList.contains('open')) closePlayer();
    else closeModal();
  }
});
